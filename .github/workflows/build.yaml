name: Tauri Build

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Target URL to load (e.g. https://example.github.io). Used as build.frontendDist'
        required: true
        type: string
      app_name:
        description: 'App name (used for binary, window title, etc.)'
        required: false
        default: 'MyWebApp'
        type: string
      package_name:
        description: 'Manual Android package name (higher priority, reverse domain format)'
        required: false
        type: string
      version:
        description: 'App version (default: 1.0.0)'
        required: false
        default: '1.0.0'
        type: string
      android_build_number:
        description: 'Android versionCode (integer, default: 1)'
        required: false
        default: '1'
        type: string

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: windows
            os: windows-latest
          - platform: android
            os: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create fresh Tauri v2 project
        shell: bash
        run: |
          npm create tauri-app@latest . -- --template vanilla --yes \
            --app-name "${{ inputs.app_name }}" \
            --window-title "${{ inputs.app_name }}"

      - name: Install dependencies
        run: npm install

      - name: Setup Nightly Rust with panic-immediate-abort
        if: matrix.platform == 'android'
        shell: bash
        run: |
          rustup toolchain install nightly-2026-04-06 --component rust-src
          rustup default nightly-2026-04-06
          rustup target add aarch64-linux-android

          sed -i '1i cargo-features = ["panic-immediate-abort"]' src-tauri/Cargo.toml

          mkdir -p .cargo
          cat > .cargo/config.toml << EOF
          [unstable]
          build-std = ["std", "panic_abort"]
          EOF

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'
          key: ${{ matrix.platform }}-nightly-2026-04-06

      - name: Setup Rust
        if: matrix.platform == 'windows'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup JDK 17 + Android SDK + NDK
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        if: matrix.platform == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d
          link-to-sdk: true

      - name: Configure Tauri for remote URL
        env:
          TARGET_URL: ${{ inputs.url }}
          MANUAL_PACKAGE: ${{ inputs.package_name }}
          VERSION: ${{ inputs.version }}
          ANDROID_BUILD: ${{ inputs.android_build_number }}
          APP_NAME: ${{ inputs.app_name }}
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            const { URL } = require("url");

            const targetUrl = process.env.TARGET_URL.trim();
            const manualPackage = process.env.MANUAL_PACKAGE || "";
            const version = process.env.VERSION || "1.0";
            const androidBuild = parseInt(process.env.ANDROID_BUILD || "1", 10);
            const appName = process.env.APP_NAME || "MyWebApp";

            let domain = "";
            try {
              domain = new URL(targetUrl).hostname;
            } catch (e) {}

            const configPath = path.join("src-tauri", "tauri.conf.json");
            let config = JSON.parse(fs.readFileSync(configPath, "utf8"));

            if (!config.build) config.build = {};
            config.build.frontendDist = targetUrl;

            let identifier = manualPackage;
            if (!identifier && domain) {
              identifier = domain.split(".").reverse().join(".");
            }
            if (identifier) config.identifier = identifier;

            config.version = version;
            if (!config.productName) config.productName = appName;

            if (!config.bundle) config.bundle = {};
            if (!config.bundle.android) config.bundle.android = {};
            config.bundle.android.versionCode = androidBuild;

            fs.writeFileSync(configPath, JSON.stringify(config, null, 2) + "\n");
          '

      - name: Initialize Android target
        if: matrix.platform == 'android'
        run: npm run tauri android init --skip-targets-install

      - name: Prepare Android Keystore
        if: matrix.platform == 'android'
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p src-tauri/gen/android
          echo "$ANDROID_KEY_BASE64" | base64 -d > src-tauri/gen/android/upload-keystore.jks

          cat > src-tauri/gen/android/keystore.properties << EOF
          storeFile=upload-keystore.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Configure Gradle signing for release
        if: matrix.platform == 'android'
        shell: bash
        run: |
          GRADLE_FILE="src-tauri/gen/android/app/build.gradle.kts"
          cat > /tmp/signing_config.patch << 'EOF'
          import java.util.Properties

          val keystorePropertiesFile = rootProject.file("keystore.properties")
          val keystoreProperties = Properties()
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(java.io.FileInputStream(keystorePropertiesFile))
          }

          android {
              signingConfigs {
                  create("release") {
                      storeFile = file(keystoreProperties.getProperty("storeFile"))
                      storePassword = keystoreProperties.getProperty("storePassword")
                      keyAlias = keystoreProperties.getProperty("keyAlias")
                      keyPassword = keystoreProperties.getProperty("keyPassword")
                  }
              }

              buildTypes {
                  release {
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }
          EOF

          awk '
            /android\s*\{/ { 
              print; 
              system("cat /tmp/signing_config.patch"); 
              next 
            } 
            { print }
          ' "$GRADLE_FILE" > "$GRADLE_FILE.tmp" && mv "$GRADLE_FILE.tmp" "$GRADLE_FILE"

      - name: Build Windows x86_64
        if: matrix.platform == 'windows'
        run: npm run tauri build -- --target x86_64-pc-windows-msvc -b nsis

      - name: Build Android ARM64
        if: matrix.platform == 'android'
        run: npm run tauri android build -- --target aarch64 --apk --ci

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/*.exe
          retention-days: 30

      - name: Upload Android APK
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-*.apk
          retention-days: 30
