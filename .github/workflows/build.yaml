name: Tauri Build - Windows x86_64 + Android ARM64

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Target URL to load (e.g. https://example.github.io). Also used as build.frontendDist'
        required: true
        type: string
      package_name:
        description: 'Manual Android package name (higher priority, reverse domain format)'
        required: false
        type: string
      version:
        description: 'App version (default: 1.0)'
        required: false
        default: '1.0'
        type: string
      android_build_number:
        description: 'Android versionCode / build number (integer, default: 1)'
        required: false
        default: '1'
        type: string

# Required GitHub Secrets:
# - ANDROID_KEY_BASE64
# - ANDROID_KEYSTORE_PASSWORD
# - ANDROID_KEY_ALIAS
# - ANDROID_KEY_PASSWORD

jobs:
  windows:
    name: Build Windows x86_64 + NSIS Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Configure Tauri for remote URL (frontendDist + package name)
        env:
          TARGET_URL: ${{ inputs.url }}
          MANUAL_PACKAGE: ${{ inputs.package_name }}
          VERSION: ${{ inputs.version }}
          ANDROID_BUILD: ${{ inputs.android_build_number }}
        shell: bash
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            const { URL } = require("url");

            const targetUrl = process.env.TARGET_URL.trim();
            const manualPackage = process.env.MANUAL_PACKAGE;
            const version = process.env.VERSION || "1.0";
            const androidBuild = parseInt(process.env.ANDROID_BUILD || "1", 10);

            // Auto extract domain from URL
            let domain = "";
            try {
              const parsed = new URL(targetUrl);
              domain = parsed.hostname;
              console.log(`Extracted domain from URL: ${domain}`);
            } catch (e) {
              console.warn("Warning: Failed to parse URL for domain extraction");
            }

            // Update tauri.conf.json
            const configPath = path.join("src-tauri", "tauri.conf.json");
            let config = JSON.parse(fs.readFileSync(configPath, "utf8"));

            if (!config.build) config.build = {};
            config.build.frontendDist = targetUrl;

            let identifier = manualPackage;
            if (!identifier && domain) {
              identifier = domain.split(".").reverse().join(".");
            }
            if (identifier) {
              config.identifier = identifier;
            }

            config.version = version;

            if (!config.bundle) config.bundle = {};
            if (!config.bundle.android) config.bundle.android = {};
            config.bundle.android.versionCode = androidBuild;

            fs.writeFileSync(configPath, JSON.stringify(config, null, 2) + "\n");

            console.log("✅ Tauri config updated for remote URL mode");
            console.log("   frontendDist =", config.build.frontendDist);
            console.log("   identifier   =", config.identifier || "not set");
            console.log("   version      =", config.version);
            console.log("   android.versionCode =", config.bundle.android.versionCode);
          '

      - name: Build Windows x86_64 (includes NSIS installer)
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts (portable + NSIS installer)
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/*.exe
          retention-days: 30

  android:
    name: Build Android ARM64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d
          link-to-sdk: true

      - name: Configure Tauri for remote URL (frontendDist + package name)
        env:
          TARGET_URL: ${{ inputs.url }}
          MANUAL_PACKAGE: ${{ inputs.package_name }}
          VERSION: ${{ inputs.version }}
          ANDROID_BUILD: ${{ inputs.android_build_number }}
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            const { URL } = require("url");

            const targetUrl = process.env.TARGET_URL.trim();
            const manualPackage = process.env.MANUAL_PACKAGE;
            const version = process.env.VERSION || "1.0";
            const androidBuild = parseInt(process.env.ANDROID_BUILD || "1", 10);

            let domain = "";
            try {
              const parsed = new URL(targetUrl);
              domain = parsed.hostname;
              console.log(`Extracted domain from URL: ${domain}`);
            } catch (e) {
              console.warn("Warning: Failed to parse URL for domain extraction");
            }

            const configPath = path.join("src-tauri", "tauri.conf.json");
            let config = JSON.parse(fs.readFileSync(configPath, "utf8"));

            if (!config.build) config.build = {};
            config.build.frontendDist = targetUrl;

            let identifier = manualPackage;
            if (!identifier && domain) {
              identifier = domain.split(".").reverse().join(".");
            }
            if (identifier) config.identifier = identifier;

            config.version = version;

            if (!config.bundle) config.bundle = {};
            if (!config.bundle.android) config.bundle.android = {};
            config.bundle.android.versionCode = androidBuild;

            fs.writeFileSync(configPath, JSON.stringify(config, null, 2) + "\n");

            console.log("✅ Tauri config updated for remote URL mode");
            console.log("   frontendDist =", config.build.frontendDist);
            console.log("   identifier   =", config.identifier || "not set");
            console.log("   version      =", config.version);
            console.log("   android.versionCode =", config.bundle.android.versionCode);
          '

      - name: Prepare Android signing keystore
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p src-tauri/gen/android

          echo "$ANDROID_KEY_BASE64" | base64 -d > src-tauri/gen/android/upload-keystore.jks

          cat > src-tauri/gen/android/keystore.properties << EOF
          storeFile=upload-keystore.jks
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

          echo "✅ Android signing keystore prepared"

      - name: Build Android ARM64 (release, signed)
        run: npm run tauri android build -- --target aarch64 --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64
          path: |
            src-tauri/gen/android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30
